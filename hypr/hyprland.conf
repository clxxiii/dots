
#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

$terminal = alacritty
$wallpaper = ~/Pictures/Wallpapers/video/cozy-room.1920x1080.mp4

# See https://wiki.hyprland.org/Configuring/Monitors/
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Slow app launch fix
exec-once = systemctl --user import-environment &
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = dbus-update-activation-environment --systemd &

# Open utilities
exec-once = systemctl --user start hyprpolkitagent
exec-once = mpvpaper -o "loop=inf" eDP-1 $wallpaper # Wallpepr
# exec-once = swayidle -w timeout 600 'swaylock'
exec-once = eww open-many monitor-border hyprbar # bar
exec-once = mako & # notification service
exec-once = nm-applet --indicator & # network manager system tray

# Autostart applications
exec-once = [workspace special] thunderbird
exec-once = vesktop --ozone-platform-hint=auto &

# Some default env vars.
env = XCURSOR_SIZE,24

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 3
    gaps_out = 16

    border_size = 1
    col.active_border = rgba(585b7033)
    col.inactive_border = rgba(1e1e2e33)

    resize_on_border = true
    extend_border_grab_area = 15

    layout = dwindle

    # apply_sens_to_raw=0 # whether to apply the sensitivity to raw input (e.g. used by games where you aim using your mouse)
}

decoration {
    rounding = 8

    dim_inactive = true
    dim_strength = 0.2

    blur {
      enabled = true
      size = 6
      passes = 3
      noise = 0
      new_optimizations = true
      xray = false
      ignore_opacity = true
    }

    shadow {
      enabled = false
    }
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 3, myBezier
    animation = windowsOut, 1, 3, default, popin 80%
    animation = border, 1, 3, default
    animation = borderangle, 1, 4, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 3, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = true
}

misc {
    #disable_autoreload = true
    disable_hyprland_logo = true
    always_follow_on_dnd = true
    layers_hog_keyboard_focus = true
    animate_manual_resizes = false
    enable_swallow = true
    swallow_regex =
    focus_on_activate = true
    vfr = 1
}

# Eww layerrules
layerrule = ignorezero, gtk-layer-shell
layerrule = blur, gtk-layer-shell
layerrule = xray on, gtk-layer-shell


# Example windowrule v1
# windowrule = float, ^(kitty)$
# Window Opacities
windowrule = opacity 0.7,class:Rofi-launcher
windowrule = opacity 0.8,class:Spotify
windowrule = opacity 0.8,class:discord
windowrule = opacity 0.8,class:vesktop
windowrule = opacity 0.8,class:mailspring
windowrule = opacity 0.8,class:todoist
windowrule = opacity 0.8,class:obsidian
windowrule = opacity 0.8,class:org.gnome.Nautilus
windowrule = opacity 0.8,class:Code
windowrule = opacity 0.8,class:neovide
windowrule = opacity 0.8,class:com.chatterino.chatterino
windowrule = opacity 0.8,class:thunderbird

layerrule = blur,rofi # Rofi
# layerrule = dimaround,0x55ca657ecc40 # Rofi

# Default Float
windowrule = float,class:blueman
windowrule = float,class:Calculator

# Warning for xwayland windows
windowrule = bordersize 5, xwayland:1
windowrule = bordercolor rgb(ff0000), xwayland:1

windowrule = workspace silent,class:vesktop

bindl =,switch:Lid Switch,exec,swaylock

$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = ,Print, exec, grimblast copy area
bind = $mainMod SHIFT, Q, killactive, 
bind = $mainMod SHIFT, E, exec, rofi -show p -modi 'p:~/.config/rofi/rofi-power-menu-hypr --choices shutdown/reboot/suspend/logout',
# bind = $mainMod, PERIOD, exec, rofi -show emoji,
bind = $mainMod SHIFT, SPACE, togglefloating, 
bind = $mainMod SHIFT, D, exec, ~/.config/eww/cards.sh toggle # cards toggle
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, E, togglesplit, # dwindle
bind = $mainMod, P, pseudo # dwindle
bind = $mainMod, F, fullscreen # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move window with mainMod + SHIFT +arrow keys
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Toggle between floating and tiled and psuedo windows
bind = $mainMod, space, exec, $(hyprctl activewindow -j | jq '.floating') && hyprctl dispatch cyclenext tiled || hyprctl dispatch cyclenext floating


# Resize mode
bind = $mainMod, r, submap, resize
submap = resize
bind = , escape, submap, reset

binde = SHIFT, H, moveactive, -40 0
binde = SHIFT, L, moveactive, 40 0
binde = SHIFT, J, moveactive, 0 40
binde = SHIFT, K, moveactive, 0 -40

binde = , H, resizeactive, -40 0
binde = , L, resizeactive, 40 0
binde = , J, resizeactive, 0 40
binde = , K, resizeactive, 0 -40

submap = reset

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Example special workspace (scratchpad)
bind = $mainMod, T, togglespecialworkspace, special
bind = $mainMod SHIFT, T, movetoworkspace, special:special

# Move windows with mainMod + LMB and dragging
bindm = $mainMod, mouse:272, movewindow

# Media Keys
bind=,XF86AudioLowerVolume,exec,pamixer -ud 3 && pamixer --get-volume > /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob
bind=,XF86AudioRaiseVolume,exec,pamixer -ui 3 && pamixer --get-volume > /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob
# mute sound
bind=,XF86AudioMute,exec,amixer sset Master toggle | sed -En '/\[on\]/ s/.*\[([0-9]+)%\].*/\1/ p; /\[off\]/ s/.*/0/p' | head -1 > /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob

bind=,XF86AudioPlay,exec, playerctl play-pause
bind=,XF86AudioNext,exec, playerctl next
bind=,XF86AudioPrev,exec, playerctl previous

bind=,XF86MonBrightnessUp,   exec, brightnessctl set +5%
bind=,XF86MonBrightnessDown, exec, brightnessctl set 5%-
